<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联系 · 老兵部落</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📞</text></svg>">
</head>
<body>
<div class="page-wrap">
  <nav class="header-nav">
    <a href="index.html" class="logo">
      <svg viewBox="0 0 36 36" fill="none"><path d="M18 3L3 15h4v14h8V19h6v10h8V15h4L18 3z" fill="#f5efe0" opacity="0.9"/></svg>
      老兵部落
    </a>
    <button class="hamburger" aria-label="菜单"><span></span><span></span><span></span></button>
    <ul class="nav-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="about.html">关于</a></li>
      <li><a href="gallery.html">相册</a></li>
      <li><a href="graffiti.html">涂鸦</a></li>
      <li><a href="guestbook.html">留言</a></li>
      <li><a href="contact.html" class="active">联系</a></li>
    </ul>
  </nav>

  <main>
    <section class="section">
      <h2 class="section-title">联系我们</h2>
      <div class="section-divider-wrap">
        <span class="line"></span><span class="diamond"></span><span class="line"></span>
      </div>
      <p class="section-subtitle">找小院、找老兵，都可以</p>

      <div class="contact-grid">
        <div class="contact-card">
          <h3>📞 联系方式</h3>
          <p><span class="label">电话：</span><a href="tel:" id="contactPhone" style="color:var(--green-dark);">待填写</a></p>
          <p style="margin-top:0.5rem;"><span class="label">微信：</span><span id="contactWechat">待填写</span></p>
          <p style="margin-top:0.5rem;"><span class="label">邮箱：</span><span id="contactEmail">待填写</span></p>
          <p style="margin-top:0.5rem;"><span class="label">地址：</span><span id="contactAddress">福建省福州市闽清县 · 城镇观邸西南侧约290米</span></p>
          <p style="margin-top:1.2rem; font-size:0.85rem; color:var(--orange);">
            电话和微信等信息，联系老兵获取。
          </p>
        </div>

        <div class="contact-card">
          <h3>📍 小院位置</h3>
          <p style="margin-bottom:0.8rem;">福建省福州市闽清县 · 城镇观邸西南侧</p>
          <div id="mapContainer" style="height:300px;border-radius:10px;overflow:hidden;">
            <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=118.850%2C26.236%2C118.870%2C26.253&amp;layer=mapnik&amp;marker=26.2446%2C118.8602" style="width:100%;height:100%;border:0;" allowfullscreen loading="lazy"></iframe>
          </div>
        </div>
      </div>

      <!-- 预约来访 -->
      <div style="max-width:600px;margin:3rem auto 0;">
        <h3 style="font-family:var(--font-cn);color:var(--green-dark);text-align:center;margin-bottom:1.5rem;">📋 你想什么时候来？</h3>
        <div class="card" style="padding:1.5rem 2rem;">
          <form id="visitForm">
            <p style="margin-bottom:0.8rem;font-size:0.95rem;">
              <label>怎么称呼你？<br>
                <input type="text" id="visitName" style="width:100%;padding:0.5rem 0.8rem;border:2px solid var(--cream-dark);border-radius:6px;font-size:0.9rem;margin-top:0.3rem;" placeholder="名字" required>
              </label>
            </p>
            <p style="margin-bottom:0.8rem;font-size:0.95rem;">
              <label>什么时间方便？<br>
                <select id="visitTime" style="width:100%;padding:0.5rem 0.8rem;border:2px solid var(--cream-dark);border-radius:6px;font-size:0.9rem;margin-top:0.3rem;background:#fff;">
                  <option value="">选一个...</option>
                  <option>周末想来坐坐</option>
                  <option>节假日过来</option>
                  <option>约老兵酒局</option>
                  <option>带孩子来体验</option>
                  <option>还没想好，先问问</option>
                </select>
              </label>
            </p>
            <p style="margin-bottom:0.8rem;font-size:0.95rem;">
              <label>联系方式（选填）<br>
                <input type="text" id="visitContact" style="width:100%;padding:0.5rem 0.8rem;border:2px solid var(--cream-dark);border-radius:6px;font-size:0.9rem;margin-top:0.3rem;" placeholder="电话或微信">
              </label>
            </p>
            <button type="submit" class="submit-btn" style="width:100%;">提交预约</button>
          </form>
          <p id="visitResult" style="margin-top:0.8rem;color:var(--green-dark);text-align:center;display:none;">✅ 已收到！老兵会看到的。</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p class="footer-logo">老兵部落 · 小院</p>
    <p>一个老兵的家 | <a href="contact.html">联系我们</a></p>
    <p style="margin-top:0.5rem; font-size:0.8rem; opacity:0.5;">© 2026 老兵部落</p>
  </footer>
</div>
<script src="js/main.js"></script>
</body>
</html>
