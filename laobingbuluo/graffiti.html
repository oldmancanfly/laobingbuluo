    <section class="section">
      <h2 class="section-title">涂鸦墙</h2>
      <div class="section-divider-wrap">
        <span class="line"></span><span class="diamond"></span><span class="line"></span>
      </div>
      <p class="section-subtitle">随便画点什么，画完可以存到电脑上</p>

      <div class="graffiti-container">
        <canvas id="graffitiCanvas"></canvas>

        <div class="graffiti-tools">
          <input type="color" id="penColor" value="#2c1810">
          <label style="font-size:0.85rem;color:var(--text-light);">粗细</label>
          <input type="range" id="penWidth" min="1" max="20" value="4">
          <button class="tool-btn" id="clearCanvas">清空</button>
          <button class="tool-btn" id="undoCanvas">撤销</button>
          <button class="tool-btn" id="saveCanvas">保存图片</button>
        </div>
      </div>
    </section>
  </main>
